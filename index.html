<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hookify – AI Hook Generator</title>

<style>
body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#4f46e5,#9333ea);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:12px;
width:400px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
margin-bottom:10px;
}

p{
color:#555;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
margin-top:15px;
}

select{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
margin-top:10px;
}

button{
width:100%;
padding:12px;
background:#4f46e5;
color:white;
border:none;
border-radius:8px;
margin-top:15px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#3730a3;
}

.result{
margin-top:20px;
text-align:left;
}
</style>
</head>

<body>

<div class="container">

<h1>Hookify</h1>
<p>Generate Viral Hooks for Your Content</p>

<input type="text" placeholder="Enter your topic">

<select>
<option>YouTube</option>
<option>Instagram</option>
<option>TikTok</option>
</select>

<button>Generate Hooks</button>

<div class="result">
<p>AI hooks will appear here...</p>
</div>

</div>

</body>
  </html>
